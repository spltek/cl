name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runners cost 10x Actions minutes on private repos, so CI
    # covers Linux and Windows; macOS is exercised locally by the
    # maintainer on every change instead.
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Syntax-check install.ps1 (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("install.ps1", [ref]$null, [ref]$errors) | Out-Null
          if ($errors) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "install.ps1 parses cleanly"

      - name: Syntax-check install.sh (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: bash -n install.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
